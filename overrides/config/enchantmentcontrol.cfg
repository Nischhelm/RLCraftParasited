    # Define custom creature attributes and how to match them to entities.
    # Pattern: S:MY_ATTR_NAME=type, string1, string2, string3, ...
    # Available types: 
    #   modid: only check modid(s) 
    #   mob: check against 1 or more mob registry names 
    #   class: check if given class is in java class hierarchy of the mob
    # Examples:
    #   S:LYCANITE=modid, lycanitesmobs
    #   S:DRAGON=mob, minecraft:ender_dragon, iceandfire:firedragon, iceandfire:icedragon
    #   S:ANIMAL=class, net.minecraft.entity.EntityAgeable
    ##########################################################################################################

    "creature attributes" {
    }

    ##########################################################################################################
    # debug
    #--------------------------------------------------------------------------------------------------------#
    # Debug Options
    ##########################################################################################################

    debug {
        # Enchantment classes that should not be modified at all by this mod. 
        # Use this if there are crashes when this mod tries to automatically modify some mods enchantments. 
        # You can find the class name in config/enchantmentcontrol/tmp/enchclasses.dump
        # Class names noted here need to look like net.minecraft.enchantment.EnchantmentDamage
        # Vanilla enchants will always be targeted, so putting their classes in here won't do anything
        S:"Blacklisted Enchantment Classes" <
         >

        # If enabled, using "Print Default Item Types" will also print all enchants and items that have custom behavior for general or anvil item application.
        #  Prints go to each blacklist. Will also automatically turn them into whitelists by untoggling "Allow Modded Behavior"
        # This option exists to make it easier for the few wanting full control over item types to see which enchantments have overriding behavior to account for
        B:"Print Item Type Blacklists"=false

        # If enabled, writes all currently loaded enchantment infos to /config/enchantmentcontrol/loaded/ during startup. Can be used to check if a given config json is actually loaded (and loaded correctly).
        B:"Print Loaded Enchantment Infos"=false
    }

    ##########################################################################################################
    # anvil mechanics
    #--------------------------------------------------------------------------------------------------------#
    # Options for Anvil Mechanics
    ##########################################################################################################

    "anvil mechanics" {
        # Main toggle for the Anvil Use Cost: Scaling Type, Combination Type and Scaling Factor in this config to be applicable
        B:"(MixinToggle) Change Cost Scaling"=false

        # Removes the "Too Expensive" system of anvils
        B:"(MixinToggle) Never Too Expensive"=false

        # If enabled, using the anvil on an item without modifying its enchantments (repair with item or material, renames) will not increase its anvil use cost
        B:"(MixinToggle) No Cost Increase On Repairs"=false

        # How the Anvil Use Cost of two items that are combined in the anvil get combined for the resulting item
        #   MAX: The default system. The resulting item will use the bigger anvil use cost of the two ingredient items (+1 use)
        #   SUM: Will add up the two items use cost (+1 use)
        #   AVERAGE: Will average the two items use cost (+1 use)
        #   MIN: Will take the smaller anvil use cost of the two ingredient items (+1 use). Probably not a great idea to use this one but who knows.
        # Note: This will also apply to the anvil use COUNT used to calc the anvil use COST
        # Valid values:
        # MIN
        # MAX
        # SUM
        # AVERAGE
        S:"Anvil Use Cost Combination Type"=MAX

        # Scaling factor "a" used in combination with the "Scaling Type" defined here.
        # Default is EXPONENTIAL with a factor of 2
        D:"Anvil Use Cost Scaling Factor"=2.0

        # How Anvil Use Cost ("RepairCost") scales with increased uses of the anvil
        # Available Types:
        #   EXPONENTIAL (a^n) - 1: Default system, possibly with modified scaling factor. Every use multiplies the current cost by the given factor (-1)
        #   QUADRATIC (a x n²): Less steep increase on more uses. With a factor of 1 it's similar to exponential but doesn't go as crazy for higher uses
        #   LINEAR (a x n): Slow increase. Every use adds the given factor to the current cost.
        #   CONST (a): No increase. Items that have been used in the anvil previously will have a fixed additional cost of the given factor. Items never used in the anvil before will have no additional cost.
        # In all of those, a is the "Scaling Factor" defined here and n is the current use count
        # Personal suggestion to use QUADRATIC with factor 1. Extremely close to default for anvil uses of 0-5, noticeably less crazy increase for higher uses
        # Default: 0, 1, 3, 7, 15, 31, 63, 127, 255, 512, 1023
        # Suggested quadratic: 0, 1, 4, 9, 16, 25, 36, 49, 64, 81, 100
        # Valid values:
        # EXPONENTIAL
        # QUADRATIC
        # LINEAR
        # CONST
        S:"Anvil Use Cost Scaling Type"=EXPONENTIAL

        ##########################################################################################################
        # blood anvil
        #--------------------------------------------------------------------------------------------------------#
        # Options for the Blood Anvil
        ##########################################################################################################

        "blood anvil" {
            # Allows to move enchants to an already enchanted item. 
            # If a moved enchant is already on the item, the one with the bigger level is kept, ignoring combination rules like 4+4=5
            B:"Allow Already Enchanted"=true

            # Allows to move enchants to a book or enchanted book
            B:"Allow Books"=false

            # If disabled, will clamp enchantment levels that are moved to their allowed range of levels
            # Note: if the target item already has an enchantment outside of its allowed range, this level will not be affected by the clamping.
            B:"Allow illegal levels"=true

            # If disabled, will check and filter for mutually exclusive enchantments on the original item.
            # Otherwise such illegal enchantment combinations would just be moved over to the target item.
            # Note: Enabling this will allow to *move existing* illegal enchantment combinations using the blood anvil.
            B:"Allow mutually exclusive original"=true

            # If disabled, will check and filter for mutually exclusive enchantments on the target item compared to the enchantments that are moved.
            # This option only has an effect if "Allow Already Enchanted" is enabled.
            # Note: Enabling this will allow to *create* illegal enchantment combinations using the blood anvil.
            B:"Allow mutually exclusive target"=false

            # If enabled, will not check for whether the moved enchants can actually go on the target item.
            # Note: Enabling this will allow all kinds of unintended item x enchantment combinations of which most will not do anything. Handle with care
            B:"Allow unapplicable"=false

            # If enabled, will combine the items repair costs too, the same way anvils do according to "Anvil Use Cost Combination Type", but without increasing the cost
            B:"Also move Repair Cost"=true

            # Enables the Blood Anvil, a Block similar to the anvil which allows to move enchants from one item to another.
            B:Enabled=true

            # Items from this list cannot receive enchantments from the blood anvil
            S:"Target Item Blacklist" <
             >

            # Treat the blacklist as whitelist
            B:"Target Item Blacklist is Whitelist"=false

            # How many XP Levels using the Blood Anvil will cost, flat
            # Min: 0
            # Max: 2147483647
            I:"XP Level Cost"=100

            # If enabled, will calculate the total cost of the enchantment move depending on the config defined anvil formulas for calculating xp costs
            B:"XP Level Cost Is Dynamic"=false
        }

    }

    ##########################################################################################################
    # enchantment table mechanics
    #--------------------------------------------------------------------------------------------------------#
    # Options for Enchantment Table Mechanics
    ##########################################################################################################

    "enchantment table mechanics" {
        # Allows to enchant already enchanted items on enchanting table.
        # This will add to existing enchants.
        # Incompatible with apotheosis
        B:"(MixinToggle) Allow Re-Enchant"=false

        # Restores older minecraft versions behavior of rolling new enchantments whenever the item gets placed fresh into the enchantment table.
        # Incompatible with apotheosis
        B:"(MixinToggle) Always reroll table"=false

        # Max level the vanilla enchanting table can roll. 
        # Only works in steps of 2.
        # Set to -1 to disable mixin (requires restart)
        # Incompatible with apotheosis
        # Min: -1
        # Max: 2147483647
        I:"(MixinToggle) Enchantment Table Max Lvl"=-1

        # Shows the enchantment clue directly in the GUI of the enchantment table instead of needing to hover.
        B:"(MixinToggle) Preview Enchantment Clue"=true
    }

