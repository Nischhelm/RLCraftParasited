        ##########################################################################################################
        # enchants
        #--------------------------------------------------------------------------------------------------------#
        # Settings for enchants on the mob equipment. By default unchanged from vanilla.
        ##########################################################################################################

        enchants {
            # Allow treasure enchantments on enchanted armor pieces?
            B:"Armor - Allow Treasure Enchants"=false

            # Chance for armor pieces to be enchanted. Scaled with local clamped difficulty, so the given value will only be reached if the area is inhabited for a while.
            D:"Armor - Enchanted Chance"=0.5

            # Maximum enchantability enchanted armor pieces will have. This is only reached if the local clamped difficulty is 1, so if the area is inhabited for a while.
            # Min: 1
            # Max: 2147483647
            I:"Armor - Max Ench"=22

            # Minimum enchantability enchanted armor pieces will have
            # Min: 1
            # Max: 2147483647
            I:"Armor - Min Ench"=5

            # Allow treasure enchantments on enchanted mainhand items?
            B:"Mainhand - Allow Treasure Enchants"=false

            # Chance for mainhand items to be enchanted. Scaled with local clamped difficulty, so the given value will only be reached if the area is inhabited for a while.
            D:"Mainhand - Enchanted Chance"=0.25

            # Maximum enchantability enchanted mainhand items will have. This is only reached if the local clamped difficulty is 1, so if the area is inhabited for a while.
            # Min: 1
            # Max: 2147483647
            I:"Mainhand - Max Ench"=22

            # Minimum enchantability enchanted mainhand items will have
            # Min: 1
            # Max: 2147483647
            I:"Mainhand - Min Ench"=5
        }

        ##########################################################################################################
        # spartan skeletons
        #--------------------------------------------------------------------------------------------------------#
        # Settings for skeletons using Spartan Crossbows and Longbows
        ##########################################################################################################

        "spartan skeletons" {
            # Skeletons holding spartan bows/crossbows will gain a bonus on the distance in which they will strafe around a target entity based on the extra projectile range they get from their spartan ranged weapon.
            B:"Enable AI Strafe Distance Bonus"=true

            # Skeletons holding spartan bows/crossbows will gain a (multiplicative/op1) follow range modifier depending on the extra shooting range they get due to their increased projectile speed.
            B:"Enable Follow Range Bonus"=true

            # Skeletons holding spartan bows/crossbows will have a movement speed penalty when strafing depending on the extra projectile speed they get from their spartan ranged weapon.
            B:"Enable Move Speed Penalty"=true
        }

    }

