    ##########################################################################################################
    # mob equipment
    #--------------------------------------------------------------------------------------------------------#
    # Modify Gear of some Mobs
    ##########################################################################################################

    "mob equipment" {
        # This system is a bit hard to comprehend. Once vanilla decided to give a mob at least one armor piece, for each possible additional armor piece on that mob it will roll with a chance of either 90% (hard mode) or 75% (any other difficulty) to add more armor pieces. 
        # The given multiplier here will be multiplied on the 90% or 75%, so a number bigger than 1 will increase the chance for mobs having more than one armor piece, while a number below 1 will reduce it.
        # Min: 0.0
        # Max: 1.340000033378601
        D:"Additional Armor Piece Chance Multi"=1.0

        # Base chance for mobs getting armor. This is multiplied by the local difficulty ratio (0 to 1), so the given value is only reached once a chunk is inhabited for a long time. Default: 15%
        # Min: 0.0
        # Max: 1.7976931348623157E308
        D:"Armor Base Chance"=0.15

        # Max tier of mob equipment armor. Each tier is exponentially less likely (see "Armor Tier Increase Chance"). If you increase this value you want to provide at least one armor set for each additional tier.
        # Min: 1
        # Max: 2147483647
        I:"Armor Max Tier"=6

        # Applied at least to zombies and skeletons but also to various other mobs extending from them
        # Pattern: mod_id, helmet_id, chestplate_id, leggings_id, boot_id, tier, optional dropChance
        # Leave slots empty if the armor set doesn't have a piece for that slot. Example: somemod, , onlychest, , , 1, 1
        # Default: 0: Leather Tier, 1: Gold Tier, 2: Chainmail Tier, 3: Iron Tier, 4: Diamond Tier, >4 custom to be defined if max tier is increased
        # TODO:
        # tide guardian for drowned
        # turtle shell for drowned
        # neptunium for drowned
        # living in LC
        # golem in LC
        # dragonsteel (x3) in LC
        # wool when winter
        # ice when summer
        # myrmex desert for husks
        # myrmex jungle when in jungle biome
        # death worm in desert and savannah
        S:"Armor Sets" <
            minecraft, leather_helmet, leather_chestplate, leather_leggings, leather_boots, 0, 5
            minecraft, leather_helmet, leather_chestplate, variedcommodities:leather_skirt, leather_boots, 0, 1
            iceandfire, armor_copper_metal_helmet, armor_copper_metal_chestplate, armor_copper_metal_leggings, armor_copper_metal_boots, 0, 1
            minecraft, golden_helmet, golden_chestplate, golden_leggings, golden_boots, 1, 10
            minecraft, golden_helmet, golden_chestplate, variedcommodities:golden_skirt, golden_boots, 1, 2
            defiledlands, scale_helmet, scale_chestplate, scale_leggings, scale_boots, 1, 1
            minecraft, chainmail_helmet, chainmail_chestplate, chainmail_leggings, chainmail_boots, 2, 5
            minecraft, chainmail_helmet, chainmail_chestplate, variedcommodities:chain_skirt, chainmail_boots, 2, 1
            defiledlands, umbrium_helmet, umbrium_chestplate, umbrium_leggings, umbrium_boots, 2, 3
            minecraft, iron_helmet, iron_chestplate, iron_leggings, iron_boots, 3, 8
            minecraft, iron_helmet, iron_chestplate, variedcommodities:iron_skirt, iron_boots, 3, 2
            iceandfire, armor_silver_metal_helmet, armor_silver_metal_chestplate, armor_silver_metal_leggings, armor_silver_metal_boots, 3, 4
            rlmixins, steel_helmet, steel_chestplate, steel_leggings, steel_boots, 3, 4
            minecraft, diamond_helmet, diamond_chestplate, diamond_leggings, diamond_boots, 4, 5
            minecraft, diamond_helmet, diamond_chestplate, variedcommodities:diamond_skirt, diamond_boots, 4, 1
            iceandfire, forest_troll_leather_helmet, forest_troll_leather_chestplate, forest_troll_leather_leggings, forest_troll_leather_boots, 4, 2
            iceandfire, frost_troll_leather_helmet, frost_troll_leather_chestplate, frost_troll_leather_leggings, frost_troll_leather_boots, 4, 2
            iceandfire, mountain_troll_leather_helmet, mountain_troll_leather_chestplate, mountain_troll_leather_leggings, mountain_troll_leather_boots, 4, 2
            defiledlands, scale_golden_helmet, scale_golden_chestplate, scale_golden_leggings, scale_golden_boots, 5, 1
            rlmixins, scarlite_helmet, scarlite_chestplate, scarlite_leggings, scarlite_boots, 6, 2, 0.01
            variedcommodities, full_emerald_head, full_emerald_chest, full_emerald_legs, full_emerald_boots, 6, 1, 1
